{editKey && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
                <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                  <h3 className="font-bold text-lg">Ubah Saldo</h3>
                  <button onClick={() => setEditKey(null)} className="text-gray-400 hover:text-gray-600"><Icon name="close" /></button>
                </div>
                <form onSubmit={saveEdit} className="p-6 space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">
                      Nominal Saldo Baru
                    </label>
                    <div className="relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-gray-400 text-xl">Rp</span>
                      <input 
                        required 
                        type="text" 
                        value={formatInput(editValue)} 
                        onChange={e => setEditValue(e.target.value)} 
                        className="w-full pl-12 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 outline-none font-bold text-xl" 
                      />
                    </div>
                  </div>
                  <div className="pt-4 flex justify-end gap-3">
                    <button type="button" onClick={() => setEditKey(null)} className="px-5 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-lg">Batal</button>
                    <button type="submit" className="px-5 py-2 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 shadow-md">Simpan Saldo</button>
                  </div>
                </form>
              </div>
            </div>
          )}
