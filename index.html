<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Toko Mas Heru</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>
    @media print {
      @page { size: 58mm auto; margin: 0; }
      body { margin: 0; padding: 0; }
      #root, .no-print { display: none !important; }
      #print-invoice { display: block !important; width: 58mm; padding: 4mm; font-family: 'Courier New', monospace; font-size: 9pt; background: white; }
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .material-symbols-outlined { vertical-align: middle; font-size: inherit; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-Um422Lqpxfi1OzEz6v9ahpu_T12lfT5jKqG6miqJ3FFAqfpOwUzfrTFaVYAPypvi/exec";

    const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    const Icon = ({ name, className = "" }) => <span className={`material-symbols-outlined ${className}`}>{name}</span>;
    const showAlert = (opt) => window.Swal ? window.Swal.fire(opt) : alert(opt.title);

    function App() {
      const [userRole, setUserRole] = useState(null);
      const [cashierId, setCashierId] = useState('');
      const [loading, setLoading] = useState(true);
      const [products, setProducts] = useState([]);
      const [categories, setCategories] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [balances, setBalances] = useState({ kembalian: 0, pulsa: 0, bank: 0 });
      const [storeConfig, setStoreConfig] = useState({ name: 'Toko Mas Heru', address: '', phone: '', footer: '' });

      const syncToGoogleSheets = async (action, data) => {
        try {
          await fetch(APP_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, data, timestamp: new Date().toISOString() })
          });
        } catch (e) { console.error("Sync Error", e); }
      };

      useEffect(() => {
        const loadData = async () => {
          try {
            const res = await fetch(APP_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'GET_INITIAL_DATA' }) });
            const result = await res.json();
            if (result.status === 'success') {
              setProducts(result.data.products || []);
              setCategories(result.data.categories || []);
              setTransactions(result.data.transactions || []);
              setBalances(result.data.balances || { kembalian: 0, pulsa: 0, bank: 0 });
              setStoreConfig(result.data.storeConfig || storeConfig);
            }
          } catch (e) { console.error(e); } finally { setLoading(false); }
        };
        loadData();
      }, []);

      if (loading) return <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white"><div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div><p>MEMUAT DATA TOKO...</p></div>;
      if (!userRole) return <LoginScreen onLogin={(role, code) => { setUserRole(role); setCashierId(code); }} />;

      return (
        <div className="min-h-screen">
          {userRole === 'kasir' ? (
            <KasirDashboard 
              products={products} categories={categories} storeConfig={storeConfig} 
              cashierId={cashierId} transactions={transactions} onLogout={() => setUserRole(null)}
              onTransactionSuccess={(trx) => {
                const finalTrx = { ...trx, cashierId };
                setTransactions(prev => [finalTrx, ...prev]);
                syncToGoogleSheets('ADD_TRANSACTION', finalTrx);
                setBalances(prev => {
                  let nb = { ...prev };
                  if (finalTrx.method === 'Cash') nb.kembalian += finalTrx.total;
                  else if (finalTrx.method === 'EDC BRILink') nb.bank += finalTrx.total;
                  finalTrx.items.forEach(i => {
                    if (i.category === 'Tarik Tunai') nb.kembalian -= (i.price * i.qty);
                    else if (['Pulsa', 'Paket Data'].includes(i.category)) nb.pulsa -= (i.price * i.qty);
                    else if (i.category === 'Transfer') nb.bank -= (i.price * i.qty);
                  });
                  syncToSheets('UPDATE_BALANCES', nb);
                  return nb;
                });
              }}
            />
          ) : (
            <AdminDashboard 
              products={products} setProducts={setProducts} categories={categories} setCategories={setCategories}
              transactions={transactions} balances={balances} setBalances={setBalances} storeConfig={storeConfig}
              setStoreConfig={setStoreConfig} onLogout={() => setUserRole(null)} syncToSheets={syncToGoogleSheets}
            />
          )}
        </div>
      );
    }

    function LoginScreen({ onLogin }) {
      const [role, setRole] = useState('kasir');
      const [pin, setPin] = useState('');
      const [code, setCode] = useState('');
      return (
        <div className="min-h-screen flex items-center justify-center bg-indigo-600 p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
            <h1 className="text-2xl font-bold mb-6">Toko Mas Heru</h1>
            <div className="flex gap-2 mb-6">
              <button onClick={() => setRole('kasir')} className={`flex-1 py-2 rounded-xl ${role === 'kasir' ? 'bg-indigo-600 text-white' : 'bg-gray-100'}`}>Kasir</button>
              <button onClick={() => setRole('admin')} className={`flex-1 py-2 rounded-xl ${role === 'admin' ? 'bg-red-500 text-white' : 'bg-gray-100'}`}>Admin</button>
            </div>
            <form onSubmit={(e) => { e.preventDefault(); onLogin(role, code); }} className="space-y-4">
              {role === 'kasir' && <input type="text" placeholder="KODE KASIR" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} className="w-full p-3 border rounded-xl text-center" required />}
              <input type="password" placeholder="PIN" value={pin} onChange={e=>setPin(e.target.value)} className="w-full p-3 border rounded-xl text-center" required />
              <button className="w-full bg-green-600 text-white py-3 rounded-xl font-bold">MASUK</button>
            </form>
          </div>
        </div>
      );
    }

    function KasirDashboard({ products, categories, storeConfig, cashierId, transactions, onLogout, onTransactionSuccess }) {
      const [cart, setCart] = useState([]);
      const [showPayment, setShowPayment] = useState(false);
      const [paymentMethod, setPaymentMethod] = useState('Cash');
      const [refNumber, setRefNumber] = useState('');
      const [paymentAmount, setPaymentAmount] = useState('');
      const [activeCat, setActiveCat] = useState('Semua');
      const [lastInvoice, setLastInvoice] = useState(null);

      const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);

      const handleFinish = () => {
        const bayar = parseInt(paymentAmount.replace(/\D/g, '')) || 0;
        if (bayar < total) return showAlert({icon:'error', title:'Uang Kurang'});
        const data = { id: 'INV'+Date.now().toString().slice(-6), date: new Date().toISOString(), items: cart, total, payment: bayar, change: bayar - total, method: paymentMethod, ref: refNumber };
        setLastInvoice(data);
        onTransactionSuccess(data);
        setCart([]); setShowPayment(false); setRefNumber('');
        setTimeout(() => window.print(), 500);
      };

      return (
        <div className="flex h-screen bg-gray-100">
          <div className="flex-1 flex flex-col no-print">
            <header className="bg-white p-4 shadow-sm flex justify-between items-center">
              <h2 className="font-bold">{storeConfig.name}</h2>
              <button onClick={onLogout} className="text-red-500"><Icon name="logout" /></button>
            </header>
            <div className="p-4 flex gap-2 overflow-x-auto">
              <button onClick={()=>setActiveCat('Semua')} className={`px-4 py-1 rounded-full ${activeCat==='Semua'?'bg-indigo-600 text-white':'bg-white'}`}>Semua</button>
              {categories.map(c => <button key={c.id} onClick={()=>setActiveCat(c.name)} className={`px-4 py-1 rounded-full ${activeCat===c.name?'bg-indigo-600 text-white':'bg-white'}`}>{c.name}</button>)}
            </div>
            <div className="flex-1 overflow-y-auto p-4 grid grid-cols-2 md:grid-cols-4 gap-4">
              {products.filter(p => activeCat==='Semua'||p.category===activeCat).map(p => (
                <div key={p.id} onClick={() => setCart(prev => {
                  const ex = prev.find(i => i.id === p.id);
                  return ex ? prev.map(i => i.id===p.id?{...i, qty:i.qty+1}:i) : [...prev, {...p, qty:1}];
                })} className="bg-white p-4 rounded-xl shadow-sm cursor-pointer active:scale-95 transition">
                  <p className="font-bold text-sm h-10 overflow-hidden">{p.name}</p>
                  <p className="text-indigo-600 font-bold">{formatRp(p.price)}</p>
                </div>
              ))}
            </div>
          </div>
          <div className="w-80 bg-white shadow-xl flex flex-col no-print">
            <div className="p-4 border-b font-bold text-lg">Keranjang ({cart.length})</div>
            <div className="flex-1 overflow-y-auto p-4 space-y-3">
              {cart.map(i => (
                <div key={i.id} className="flex justify-between items-center text-sm">
                  <span>{i.name} (x{i.qty})</span>
                  <span>{formatRp(i.price * i.qty)}</span>
                </div>
              ))}
            </div>
            <div className="p-4 bg-gray-50 border-t">
              <div className="flex justify-between font-bold text-lg mb-4"><span>Total</span><span>{formatRp(total)}</span></div>
              <button onClick={()=>setShowPayment(true)} disabled={cart.length===0} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold disabled:bg-gray-300">BAYAR</button>
            </div>
          </div>

          {showPayment && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
              <div className="bg-white p-6 rounded-2xl w-full max-w-md">
                <h3 className="text-xl font-bold mb-4">Pembayaran</h3>
                <div className="text-3xl font-bold text-indigo-600 mb-6 text-center">{formatRp(total)}</div>
                <div className="grid grid-cols-2 gap-2 mb-4">
                  {['Cash', 'E-Wallet', 'Transfer', 'EDC BRILink'].map(m => (
                    <button key={m} onClick={()=>setPaymentMethod(m)} className={`py-2 rounded-lg font-bold ${paymentMethod===m?'bg-indigo-600 text-white':'bg-gray-100'}`}>{m}</button>
                  ))}
                </div>
                {paymentMethod==='EDC BRILink' && <input type="text" placeholder="No. Referensi EDC" value={refNumber} onChange={e=>setRefNumber(e.target.value)} className="w-full p-3 border rounded-xl mb-4" />}
                <input type="text" placeholder="Nominal Bayar" value={paymentAmount} onChange={e=>setPaymentAmount(e.target.value.replace(/\D/g,''))} className="w-full p-3 border rounded-xl mb-6 text-2xl font-bold text-center" />
                <div className="flex gap-2">
                  <button onClick={()=>setShowPayment(false)} className="flex-1 py-3 bg-gray-100 rounded-xl">Batal</button>
                  <button onClick={handleFinish} className="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold">CETAK</button>
                </div>
              </div>
            </div>
          )}

          {lastInvoice && (
            <div id="print-invoice" className="hidden">
              <center>
                <h2 style={{margin:0}}>{storeConfig.name}</h2>
                <p style={{fontSize:'8pt'}}>{storeConfig.address}</p>
                <hr style={{borderTop:'1px dashed #000'}}/>
              </center>
              <table style={{width:'100%', fontSize:'9pt'}}>
                {lastInvoice.items.map((i,idx)=>(
                  <tr key={idx}><td>{i.name} x{i.qty}</td><td align="right">{formatRp(i.price*i.qty)}</td></tr>
                ))}
              </table>
              <hr style={{borderTop:'1px dashed #000'}}/>
              <table style={{width:'100%', fontSize:'9pt', fontWeight:'bold'}}>
                <tr><td>TOTAL</td><td align="right">{formatRp(lastInvoice.total)}</td></tr>
                <tr style={{fontWeight:'normal'}}><td>Bayar ({lastInvoice.method})</td><td align="right">{formatRp(lastInvoice.payment)}</td></tr>
                <tr><td>KEMBALI</td><td align="right">{formatRp(lastInvoice.change)}</td></tr>
              </table>
              {lastInvoice.ref && <p style={{fontSize:'8pt'}}>Ref: {lastInvoice.ref}</p>}
              <center><p style={{fontSize:'8pt', marginTop:'10px'}}>{storeConfig.footer}</p></center>
            </div>
          )}
        </div>
      );
    }

    // --- ADMIN DASHBOARD & OTHER SUBCOMPONENTS ---
    function AdminDashboard({ transactions, storeConfig, onLogout }) {
      return (
        <div className="p-8">
          <div className="flex justify-between items-center mb-8">
            <h1 className="text-2xl font-bold">Admin - {storeConfig.name}</h1>
            <button onClick={onLogout} className="bg-red-500 text-white px-4 py-2 rounded-xl">Logout</button>
          </div>
          <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
            <table className="w-full text-left">
              <thead className="bg-gray-50 uppercase text-xs">
                <tr><th className="p-4">ID</th><th className="p-4">Tanggal</th><th className="p-4">Metode</th><th className="p-4 text-right">Total</th></tr>
              </thead>
              <tbody>
                {transactions.map(t => (
                  <tr key={t.id} className="border-t">
                    <td className="p-4">{t.id}</td><td className="p-4 text-xs">{new Date(t.date).toLocaleString()}</td>
                    <td className="p-4"><span className="bg-indigo-100 px-2 py-1 rounded text-[10px] font-bold">{t.method}</span></td>
                    <td className="p-4 text-right font-bold">{formatRp(t.total)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
